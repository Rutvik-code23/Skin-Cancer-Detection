stages:
  - build
  - test
  - push
  - deploy

backend-build-job:
  stage: build
  script:
    - echo "Building the backend..."
    - docker build -t $DOCKERHUB_USER/skin-cancer-detection-backend:latest .
    - echo "Backend build completed." > logs/build.log
  # tags:
  #   - dev
  artifacts:
    paths:
      - logs/
    expires_in: 1 week


frontend-build-job:
  stage: build
  script:
    - echo "Building the frontend..."
    - docker build -t $DOCKERHUB_USER/skin-cancer-detection-frontend:latest .
    - echo "Frontend build completed." >> logs/build.log
  # tags:
  #   - dev
  artifacts:
    paths:
      - logs/
    expires_in: 1 week


backend-test-job:
  stage: test
  script:
    - echo "Running backend container..."
    - docker run -d -p 8000:8000 --name backend-test $DOCKERHUB_USER/skin-cancer-detection-backend:latest
    
    - echo "Waiting for server to start..."
    - sleep 10
    
    - echo "Testing API..."
    - curl http://localhost:8000/

    - echo "Backend test completed." > logs/test.log
    
    - docker stop backend-test
    - docker rm backend-test
  
  artifacts:
    paths:
      - logs/
    expires_in: 1 week
  # tags:
  #   - dev


frontend-test-job:
  stage: test
  script:
    - echo "Running frontend container..."
    - docker run -d -p 3000:3000 --name frontend-test $DOCKERHUB_USER/skin-cancer-detection-frontend:latest
    
    - sleep 10
    
    - curl http://localhost:3000

    - echo "Frontend test completed." >> logs/test.log
    
    - docker stop frontend-test
    - docker rm frontend-test
  # tags:
  #   - dev
  artifacts:
    paths:
      - logs/
    expires_in: 1 week


push_job:
  stage: push
  script:
    - docker login -u $DOCKERHUB_USER -p $DOCKERHUB_PASS
    - docker push $DOCKERHUB_USER/skin-cancer-detection-backend:latest
    - docker push $DOCKERHUB_USER/skin-cancer-detection-frontend:latest
    - echo "Push to Docker Hub completed." > logs/push.log
  tags:
    - dev
  artifacts:
    paths:
      - logs/
    expires_in: 1 week


deploy_job:
  stage: deploy
  script:
    - echo "Deploying to production..."
    - docker compose up --build 
    - echo "Deployment completed." > logs/deploy.log
  artifacts:
    paths:
      - logs/
    expires_in: 1 week
